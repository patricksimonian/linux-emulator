<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kanda-linux-emulator — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f12;
      --surface: #161b22;
      --surface2: #1c2230;
      --border: #2a3140;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --muted: #6e7681;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.2px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1c6ef3 0%, #3fb950 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--surface2);
    }

    header nav {
      display: flex;
      gap: 8px;
    }

    header nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    header nav a:hover {
      color: var(--text);
      background: var(--surface2);
    }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr;
      gap: 0;
      height: calc(100vh - 65px);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-section h3 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .fs-tree {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: var(--text-dim);
      white-space: pre-wrap;
    }

    .fs-tree .dir {
      color: var(--accent);
    }

    .fs-tree .file {
      color: var(--text-dim);
    }

    .fs-tree .exec {
      color: var(--accent2);
    }

    .cmd-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cmd-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 5px;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.1s;
      text-align: left;
      width: 100%;
    }

    .cmd-chip:hover {
      background: rgba(88, 166, 255, 0.12);
      border-color: rgba(88, 166, 255, 0.4);
      color: var(--accent);
    }

    .cmd-chip span {
      color: var(--text-dim);
      font-size: 10px;
      display: block;
      margin-top: 1px;
    }

    /* ── Terminal pane ── */
    .terminal-pane {
      display: flex;
      flex-direction: column;
      background: #090c10;
      overflow: hidden;
    }

    .term-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .term-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .term-dot.red {
      background: #ff5f57;
    }

    .term-dot.yellow {
      background: #febc2e;
    }

    .term-dot.green {
      background: #28c840;
    }

    .term-title {
      margin-left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
      text-align: center;
    }

    .term-actions {
      display: flex;
      gap: 8px;
    }

    .term-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .term-btn:hover {
      background: var(--surface);
      color: var(--text);
    }

    #terminal-container {
      flex: 1;
      padding: 8px;
      overflow: hidden;
    }

    .xterm-viewport {
      border-radius: 0;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .status-item.err .status-dot {
      background: var(--red);
    }

    #status-cwd {
      color: var(--accent);
    }

    #status-code {}

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <div class="logo-icon">$_</div>
      kanda-linux-emulator
      <span class="badge">demo</span>
    </div>
    <nav>
      <a href="https://github.com/kandaplatform/kanda-linux-emulator" target="_blank">GitHub</a>
      <a href="#" id="reset-btn">Reset</a>
    </nav>
  </header>

  <main>
    <sidebar>
      <div class="sidebar-section">
        <h3>Virtual Filesystem</h3>
        <div class="fs-tree" id="fs-tree">Loading...</div>
      </div>
      <div class="sidebar-section">
        <h3>Try a command</h3>
        <div class="cmd-list">
          <button class="cmd-chip" data-cmd="ls -la">ls -la <span>list directory</span></button>
          <button class="cmd-chip" data-cmd="cat /etc/os-release">cat /etc/os-release <span>read a file</span></button>
          <button class="cmd-chip" data-cmd="mkdir projects && cd projects">mkdir + cd <span>create &
              navigate</span></button>
          <button class="cmd-chip" data-cmd="writeFile hello.txt Hello, world!">writeFile <span>create a
              file</span></button>
          <button class="cmd-chip" data-cmd="ps">ps <span>list processes</span></button>
          <button class="cmd-chip" data-cmd="echo $HOME">echo $HOME <span>env variable</span></button>
          <button class="cmd-chip" data-cmd="history">history <span>command history</span></button>
          <button class="cmd-chip" data-cmd="chmod 600 /home/user/.ssh/id_rsa">chmod <span>set
              permissions</span></button>
          <button class="cmd-chip" data-cmd="help">help <span>show all commands</span></button>
        </div>
      </div>
    </sidebar>

    <div class="terminal-pane">
      <div class="term-topbar">
        <div class="term-dot red"></div>
        <div class="term-dot yellow"></div>
        <div class="term-dot green"></div>
        <div class="term-title">bash — kanda-linux-emulator demo</div>
        <div class="term-actions">
          <button class="term-btn" id="clear-btn">Clear</button>
        </div>
      </div>
      <div id="terminal-container"></div>
      <div class="status-bar">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>ready</span>
        </div>
        <div class="status-item">cwd: <span id="status-cwd">/home/user</span></div>
        <div class="status-item">exit: <span id="status-code">0</span></div>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('error', (e) => {
      const tr = document.getElementById('fs-tree');
      if (tr && tr.innerHTML === 'Loading...') {
        tr.innerHTML = '<span style="color:var(--red); font-size:11px">Init Error:<br>' + e.message + '</span>';
      }
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
